name: server-check

on:
  pull_request:
  push:
    branches:
      - main
      - develop

jobs:
  checks:
    runs-on: ubuntu-latest
    services:
      postgres:
        image: postgres:16-alpine
        env:
          POSTGRES_USER: nulldistrict
          POSTGRES_PASSWORD: nulldistrict
          POSTGRES_DB: nulldistrict
        ports:
          - 5432:5432
        options: >-
          --health-cmd "pg_isready -U nulldistrict -d nulldistrict"
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5
    env:
      DATABASE_URL: postgresql://nulldistrict:nulldistrict@localhost:5432/nulldistrict?schema=public
      JWT_SECRET: ci-ci-ci-ci-ci-ci-ci-ci-ci-ci-ci-secret
      SERVER_PORT: 4000
      CLIENT_ORIGIN: http://localhost:1420
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm
      - run: npm ci
      - run: npm run db:generate
      - run: npm run build:shared
      - run: npm run typecheck
      - run: npm run test
